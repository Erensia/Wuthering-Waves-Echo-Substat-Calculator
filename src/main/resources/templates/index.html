<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>명조 에코 점수 계산기</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body>
<main class="container">
    <header>
        <p class="eyebrow">WUTHERING WAVES</p>
        <h1>에코 점수 계산기</h1>
        <p class="description">다섯 에코의 크리티컬 부옵션을 입력하면 세팅 등급을 계산합니다.</p>
    </header>

    <form id="score-form">
        <section class="main-stat-panel">
            <h2>1번 에코 주옵션</h2>
            <div class="main-stat-options">
                <label><input type="radio" name="mainStat" value="CRIT_RATE" checked> 크리티컬 22.0%</label>
                <label><input type="radio" name="mainStat" value="CRIT_DAMAGE"> 크리티컬 피해 44.0%</label>
            </div>
            <small>두 주옵션 모두 점수 환산 시 44점입니다.</small>
        </section>

        <p class="echo-grade-guide">
            개별 에코 등급 · 극종결 37.8+ · 종결 33.6+ · 준종결 29.4+ · 그 미만 다시 파밍 필요
        </p>
        <section class="echo-grid" id="echo-grid"></section>

        <label class="loadout-name">
            <span>세팅 이름 <small>(저장할 때만 사용, 선택)</small></span>
            <input id="loadout-name" type="text" maxlength="100" placeholder="예: 금희 회절 세팅">
        </label>
        <button class="calculate-button" type="submit">점수 계산하기</button>
        <button class="save-button" id="save-button" type="button">PostgreSQL에 결과 저장</button>
        <p class="error" id="error" role="alert"></p>
        <p class="save-message" id="save-message" role="status"></p>
    </form>

    <section class="result hidden" id="result" aria-live="polite">
        <p class="result-label">총점</p>
        <div><strong id="score">0.0</strong><span>점</span></div>
        <p class="grade" id="grade"></p>
        <dl>
            <div><dt>크리티컬 합계</dt><dd id="total-crit-rate"></dd></div>
            <div><dt>크리티컬 피해 합계</dt><dd id="total-crit-damage"></dd></div>
            <div><dt>1번 주옵션 점수</dt><dd id="main-stat-score"></dd></div>
            <div id="next-grade-row"><dt>다음 등급까지</dt><dd id="next-grade"></dd></div>
        </dl>
    </section>
</main>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
