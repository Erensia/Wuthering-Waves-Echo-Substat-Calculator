services:
  app:
    build: .
    image: echo-grader:1.0.0
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/echo_grader
      DB_USERNAME: ${DB_USERNAME:?set DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: echo_grader
      POSTGRES_USER: ${DB_USERNAME:?set DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes:
      - echo-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-echo_user} -d echo_grader"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  echo-postgres-data:
