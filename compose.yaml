services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: echo_grader
      POSTGRES_USER: echo_user
      POSTGRES_PASSWORD: echo_password
    ports:
      - "5432:5432"
    volumes:
      - echo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo_user -d echo_grader"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  echo-postgres-data:
